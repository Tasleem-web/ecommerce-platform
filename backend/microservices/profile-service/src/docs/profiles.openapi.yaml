openapi: 3.0.3

components:
  schemas:
    Profile:
      type: object
      properties:
        id:        { type: integer }
        email:     { type: string }
        name:      { type: string }
        roles:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:    { type: string, format: email }
        password: { type: string, minLength: 8 }
        name:     { type: string }
        roles:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

    LoginResponse:
      type: object
      properties:
        token: { type: string }
        profile:  { $ref: '#/components/schemas/Profile' }

paths:
  /profiles/register:
    post:
      tags: [Profiles]
      summary: Register a new profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Profile' }
        '409':
          description: Email already registered

  /profiles/login:
    post:
      tags: [Profiles]
      summary: Exchange credentials for a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401':
          description: Invalid credentials

  /profiles/me:
    get:
      tags: [Profiles]
      summary: Get the currently authenticated profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Profile' }
        '401':
          description: Unauthorized

  /profiles/getProfiles:
    get:
      tags: [Profiles]
      summary: Get all profiles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Profile' }
        '401':
          description: Unauthorized
