openapi: 3.0.3

info:
  title: Product API
  version: 1.0.0

components:
  schemas:
    Rating:
      type: object
      required: [rate, count]
      properties:
        rate:
          type: number
          format: float
          example: 3.9
        count:
          type: integer
          example: 120

    Product:
      type: object
      required: [id, title, category, image, price, stock, createdAt, updatedAt]
      properties:
        id:          { type: integer }
        title:       { type: string }
        category:    { type: string }
        image:       { type: string, format: uri }
        description: { type: string, nullable: true }
        price:       { type: number }
        stock:       { type: integer }
        rating:      { $ref: '#/components/schemas/Rating' }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }

    ProductInput:
      type: object
      required: [title, category, image, price]
      properties:
        title:       { type: string }
        category:    { type: string }
        image:       { type: string, format: uri }
        description: { type: string }
        price:       { type: number }
        stock:       { type: integer, default: 0 }
        rating:      { $ref: '#/components/schemas/Rating' }

    ProductList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Product' }
        total: { type: integer }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /products:
    get:
      tags: [Products]
      summary: List products
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductList' }

    post:
      tags: [Products]
      summary: Create a product (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }

  /products/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      tags: [Products]
      summary: Get a product by id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404':
          description: Not found

    put:
      tags: [Products]
      summary: Update a product (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '200':
          description: Updated

    delete:
      tags: [Products]
      summary: Delete a product (admin only)
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No content
